name: Build releases

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test ./...
      - run: go vet ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: tor-country-manager-linux-amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            output: tor-country-manager-linux-arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            output: tor-country-manager-windows-amd64.exe
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            output: tor-country-manager-macos-amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            output: tor-country-manager-macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Build ${{ matrix.output }}
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.output }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  bundle:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: tor-country-manager-linux-amd64
            exe: ""
            tor_install: "sudo apt-get update && sudo apt-get install -y --no-install-recommends tor tor-geoipdb"
            tor_bin: "/usr/bin/tor"
            geoip: "/usr/share/tor/geoip"
            geoip6: "/usr/share/tor/geoip6"
            pkg: tar.gz
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: tor-country-manager-linux-arm64
            exe: ""
            tor_install: "sudo apt-get update && sudo apt-get install -y --no-install-recommends tor tor-geoipdb"
            tor_bin: "/usr/bin/tor"
            geoip: "/usr/share/tor/geoip"
            geoip6: "/usr/share/tor/geoip6"
            pkg: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            binary: tor-country-manager-windows-amd64.exe
            exe: ".exe"
            tor_install: "curl -L -o tor.tar.gz https://archive.torproject.org/tor-package-archive/torbrowser/15.0.18/tor-expert-bundle-windows-x86_64-15.0.18.tar.gz && mkdir -p C:/tor-expert && tar -xzf tor.tar.gz -C C:/tor-expert --strip-components=1"
            tor_bin: "C:/tor-expert/tor.exe"
            geoip: "C:/tor-expert/geoip"
            geoip6: "C:/tor-expert/geoip6"
            pkg: zip
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            binary: tor-country-manager-macos-amd64
            exe: ""
            tor_install: "curl -L -o tor.tar.gz https://archive.torproject.org/tor-package-archive/torbrowser/15.0.18/tor-expert-bundle-macos-x86_64-15.0.18.tar.gz && mkdir -p /tmp/tor-expert && tar -xzf tor.tar.gz -C /tmp/tor-expert --strip-components=1"
            tor_bin: "/tmp/tor-expert/tor"
            geoip: "/tmp/tor-expert/geoip"
            geoip6: "/tmp/tor-expert/geoip6"
            pkg: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            binary: tor-country-manager-macos-arm64
            exe: ""
            tor_install: "curl -L -o tor.tar.gz https://archive.torproject.org/tor-package-archive/torbrowser/15.0.18/tor-expert-bundle-macos-aarch64-15.0.18.tar.gz && mkdir -p /tmp/tor-expert && tar -xzf tor.tar.gz -C /tmp/tor-expert --strip-components=1"
            tor_bin: "/tmp/tor-expert/tor"
            geoip: "/tmp/tor-expert/geoip"
            geoip6: "/tmp/tor-expert/geoip6"
            pkg: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
      - name: Install Tor and GeoIP
        shell: bash
        run: ${{ matrix.tor_install }}
      - name: Assemble bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle="dist/bundle/${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$bundle/runtime/tor" "$bundle/runtime/data"
          cp "${{ matrix.binary }}" "$bundle/TorCountryManager${{ matrix.exe }}"
          cp "${{ matrix.tor_bin }}" "$bundle/runtime/tor/tor${{ matrix.exe }}"
          cp "${{ matrix.geoip }}" "$bundle/runtime/data/geoip"
          cp "${{ matrix.geoip6 }}" "$bundle/runtime/data/geoip6"
          cat > "$bundle/config.json" <<EOF
          {
            "listen_address": "127.0.0.1:8080",
            "proxy_address": "127.0.0.1:1080",
            "tor_binary": "./runtime/tor/tor${{ matrix.exe }}",
            "state_dir": "./state",
            "geoip_file": "./runtime/data/geoip",
            "geoip6_file": "./runtime/data/geoip6",
            "base_socks_port": 19050,
            "country_proxy_host": "127.0.0.1",
            "country_proxy_base_port": 20000,
            "max_running": 10,
            "drain_timeout_seconds": 120,
            "circuit_rotate_minutes": 0,
            "countries": [
              {"code":"us","name":"United States"},
              {"code":"jp","name":"Japan"},
              {"code":"de","name":"Germany"}
            ]
          }
          EOF
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cat > "$bundle/Start.bat" <<'EOF'
          @echo off
          cd /d "%~dp0"
          TorCountryManager.exe -config config.json
          EOF
          else
            cat > "$bundle/start.sh" <<'EOF'
          #!/bin/sh
          cd "$(dirname "$0")"
          exec ./TorCountryManager -config config.json
          EOF
            chmod +x "$bundle/start.sh"
          fi
          chmod +x "$bundle/TorCountryManager${{ matrix.exe }}" "$bundle/runtime/tor/tor${{ matrix.exe }}" || true
      - name: Package bundle
        shell: bash
        run: |
          set -euo pipefail
          cd dist/bundle
          name="tor-country-manager-${{ matrix.goos }}-${{ matrix.goarch }}-bundle"
          if [ "${{ matrix.pkg }}" = "zip" ]; then
            7z a -tzip "../${name}.zip" "${{ matrix.goos }}-${{ matrix.goarch }}" || powershell -NoProfile -Command "Compress-Archive -Force -Path './${{ matrix.goos }}-${{ matrix.goarch }}' -DestinationPath '../${name}.zip'"
          else
            tar -czf "../${name}.tar.gz" "${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: tor-country-manager-${{ matrix.goos }}-${{ matrix.goarch }}-bundle
          path: dist/tor-country-manager-${{ matrix.goos }}-${{ matrix.goarch }}-bundle.${{ matrix.pkg }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: (cd dist && sha256sum *) > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
